# Configuration for MCTS Strategy

# Search strategy
search_strategy: "mcts"
expansion_width: 3             # Children per expansion
exploration_constant: 1.414    # UCT exploration (√2)

# Evolution settings
max_iterations: 50
checkpoint_interval: 5
log_level: "INFO"
random_seed: 42

# LLM configuration for evolution
llm:
  primary_model: "gpt-5"
  primary_model_weight: 0.8
  secondary_model: "gpt-5-mini"
  secondary_model_weight: 0.2

  temperature: 0.8
  top_p: 0.95
  max_tokens: 16000
  timeout: 300

# Prompt configuration
prompt:
  system_message: |
    You are an expert in multi-agent system design and mathematical problem solving.
    Your task is to EVOLVE THE ENTIRE MULTI-AGENT ARCHITECTURE to solve OlympiadBench problems.

    WHAT YOU CAN EVOLVE (all within EVOLVE-BLOCK):

    1. AGENT PROMPTS - Design effective instructions for each agent:
       - Solver: Problem-solving approach, reasoning style, breakdown strategies
       - Verifier: Verification criteria, feedback format, decision logic
       - Reviser: Revision strategies, error correction, step clarification
       - Refiner: Final polishing, simplification, answer formatting
       - You can modify prompts to be more specific, add examples, change reasoning style

    2. AGENT ARCHITECTURE - The multi-agent system structure:
       - Number of agents (can add/remove agents in solve_problem())
       - Agent roles (create new specialized agents if needed)
       - Communication order (who talks to whom, in what sequence)
       - Information flow (what information each agent receives)

    3. COMMUNICATION PROTOCOLS - AgentConfig parameters:
       - MAX_REVISION_ROUNDS: How many solver-verifier-reviser cycles (0-5)
       - USE_VERIFIER: Whether to verify solutions (True/False)
       - USE_REFINER: Whether to polish final answers (True/False)
       - Decision thresholds: When to approve, when to revise, when to stop

    4. ORCHESTRATION LOGIC - The solve_problem() function:
       - Agent execution order and control flow
       - Conditional logic (when to call which agent)
       - Early stopping conditions (high confidence, timeout prevention)
       - Revision loop structure (sequential vs. parallel, voting mechanisms)
       - Error handling and fallback strategies

    5. HELPER FUNCTIONS - Decision and extraction logic:
       - extract_decision(): How to parse verifier responses
       - extract_boxed_answer(): How to extract final answers
       - Agent functions: Can modify how agents are called

    IMPORTANT CONSTRAINTS:
    - Do NOT modify code outside EVOLVE-BLOCK (framework is fixed)
    - Must call call_llm() to interact with LLMs (don't reimplement)
    - Must return dict with 'answer', 'pred', 'llm_calls', 'conversation'
    - Keep final answer in \\boxed{} format for evaluation

    OPTIMIZATION GOALS:
    - PRIMARY: Maximize accuracy on OlympiadBench (hard competition math)
    - SECONDARY: Minimize LLM calls (efficiency)
    - TERTIARY: Minimize time (but accuracy >> speed)

    PROBLEM CHARACTERISTICS:
    - OlympiadBench problems are HARD (competition-level math)
    - Require multi-step reasoning, not single-shot answers
    - May need problem decomposition, verification, revision
    - Common issues: computational errors, logical gaps, incomplete reasoning

    EVOLUTION STRATEGIES:
    - For LOW accuracy: Improve solver prompt, add more revision rounds, enhance verification
    - For HIGH llm_calls: Reduce MAX_REVISION_ROUNDS, add early stopping, merge agent roles
    - For TIMEOUT: Add early stopping, reduce complexity, use simpler agents
    - For PARSE errors: Improve extract_decision() and extract_boxed_answer() logic

    EXAMPLE ARCHITECTURES TO EXPLORE:
    - Sequential: Solver → Verifier → Reviser → Refiner (current)
    - Iterative: Solver ⟷ Verifier loop until approved
    - Hierarchical: Planner → Solver → Verifier → Refiner
    - Parallel: Multiple solvers → Voter → Refiner
    - Adaptive: Use verifier confidence to decide next step

    Focus on evolving an architecture that achieves HIGH ACCURACY on hard math problems
    while maintaining reasonable efficiency (5-10 LLM calls per problem is acceptable).

  num_top_programs: 3
  num_diverse_programs: 2
  use_template_stochasticity: true

# Database configuration (simplified for MCTS)
database:
  population_size: 100
  feature_dimensions: []  # No MAP-Elites features needed

# Evaluator configuration
evaluator:
  timeout: 1800  # 30 minutes (increased for multi-agent systems)
  cascade_evaluation: true
  cascade_thresholds: [0.3, 0.6]
  parallel_evaluations: 4
  use_llm_feedback: false
  max_retries: 2

  # Math problem evaluation settings
  num_problems: 20  # Number of problems for full evaluation (Stage 3)
  agent_model: "gpt-5-nano"  # Model for multi-agent system agents

# Evolution settings
diff_based_evolution: false
allow_full_rewrites: true
max_code_length: 50000

# Early stopping
early_stopping_patience: 20
early_stopping_metric: "combined_score"
convergence_threshold: 0.01
