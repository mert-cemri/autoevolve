# Configuration for Symbolic Regression with Gradient-Based Evolution
# Uses gradient = improvement / code_distance for automatic exploration/exploitation

# Evolution settings
max_iterations: 200
checkpoint_interval: 10
log_level: "INFO"
random_seed: 42
target_score: "combined_score"

# Memory Configuration - REQUIRED for gradient computation
memory:
  enabled: true
  load_from_snapshot: false  # Start fresh
  semantic_search_topk: 5  # Get more candidates for gradient-based filtering
  embed_model: "text-embedding-3-large"  # OpenAI embedding model for semantic distance

# LLM configuration
llm:
  primary_model: "gpt-4o"
  primary_model_weight: 0.8
  secondary_model: "o3"
  secondary_model_weight: 0.2
  api_base: "https://api.openai.com/v1"
  temperature: 0.7
  top_p: 0.95
  max_tokens: 8192
  timeout: 300

# Prompt configuration
prompt:
  system_message: |
    You are an expert in symbolic regression and mathematical modeling.
    Your task is to evolve a Python function `func(x, params)` that models a scientific process,
    predicting output variables based on input variables.

    The function signature is:
    ```python
    def func(x: np.ndarray, params: np.ndarray) -> np.ndarray:
    ```

    - `x` is a 2D NumPy array of shape `(n_samples, n_features)` containing input variables
    - `params` is a 1D NumPy array of up to 10 parameters (optimized externally via BFGS)
    - The function should return a 1D NumPy array of predictions with shape `(n_samples,)`

    Key principles:
    - Aim for accurate predictions with low mean squared error (MSE)
    - Prefer simple, interpretable mathematical expressions
    - Consider the physical meaning and relationships of input variables
    - Avoid numerical issues (division by zero, log of negative numbers, etc.)
    - Balance model complexity with generalization ability

    Performance metric: score = -log10(MSE)
    Higher scores are better. The model will be evaluated on held-out test data.

    Strategies to explore:
    - Polynomial terms and interactions between variables
    - Exponential, logarithmic, and trigonometric functions
    - Physical laws and domain-specific relationships
    - Feature engineering and transformations
    - Regularization through simplicity
  num_top_programs: 4
  use_template_stochasticity: true
  # Memory rendering - shows gradient information to LLM
  num_similar_parent_best: 3
  num_similar_parent_worst: 2
  include_similar_parent_worst: true

# Database configuration - GRADIENT-BASED SELECTION
database:
  population_size: 70
  archive_size: 30
  num_islands: 4
  elite_selection_ratio: 0.3

  # GRADIENT-BASED PARENT SELECTION (NEW!)
  # Automatically balances exploration (unvisited programs) and exploitation (high gradient)
  # No manual thresholds needed - gradient is the natural control signal
  use_gradient_selection: true

  # Adaptive search is disabled when gradient selection is active
  use_adaptive_search: false

  # Fallback ratios (not used when gradient selection is active)
  exploration_ratio: 0.3
  exploitation_ratio: 0.6

  # MAP-Elites features
  feature_dimensions: ["complexity", "diversity"]
  feature_bins: 10

# Evaluator configuration
evaluator:
  timeout: 90
  cascade_evaluation: false
  cascade_thresholds: [1.0]
  parallel_evaluations: 4
  use_llm_feedback: false

# Evolution settings
diff_based_evolution: true
allow_full_rewrites: false
