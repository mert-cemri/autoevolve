# Configuration for MCTS Search - Circle Packing (n=26)

# Search strategy
search_strategy: "mcts"
expansion_width: 3             # Children per expansion
exploration_constant: 1.414    # UCT exploration (√2)

# Evolution settings
max_iterations: 100
checkpoint_interval: 10
log_level: "INFO"
random_seed: 42

# LLM configuration
llm:
  primary_model: "gpt-5"
  primary_model_weight: 0.8
  secondary_model: "gpt-5-mini"
  secondary_model_weight: 0.2
  temperature: 0.7
  top_p: 0.95
  max_tokens: 8192
  timeout: 300

# Prompt configuration
prompt:
  system_message: |
    You are an expert mathematician specializing in circle packing problems and computational geometry.
    Your task is to improve a constructor function that produces an arrangement of 26 circles in a unit square,
    maximizing the sum of their radii. The AlphaEvolve paper achieved 2.635 for n=26.

    Key geometric insights:
    - Circle packings often follow hexagonal patterns in the densest regions
    - Maximum density for infinite circle packing is pi/(2*sqrt(3)) ≈ 0.9069
    - Edge effects make square container packing harder than infinite packing
    - Circles can be placed in layers or shells when confined to a square
    - Variable radii allow better space utilization than uniform sizes
    - Perfect symmetry may not yield the optimal packing due to edge effects
    - Mathematical optimization (scipy.optimize) can significantly improve initial constructions

    Strategies to explore:
    - Hexagonal/grid-based patterns with strategic positioning
    - Variable-sized circles (larger in center, smaller at edges)
    - Hybrid approaches combining geometric construction with numerical optimization
    - Using scipy.optimize.minimize for fine-tuning positions and radii
    - Strategic placement at corners and edges to maximize space usage

    Focus on designing explicit constructors with optimization steps, not iterative search algorithms.
  num_top_programs: 3
  num_diverse_programs: 2
  use_template_stochasticity: true

# Database configuration
database:
  population_size: 60
  feature_dimensions: []  # No MAP-Elites features needed

# Evaluator configuration
evaluator:
  timeout: 600
  cascade_evaluation: true
  cascade_thresholds: [0.5, 0.75]
  parallel_evaluations: 4
  use_llm_feedback: false
  max_retries: 2

# Evolution settings
diff_based_evolution: false
allow_full_rewrites: true
max_code_length: 100000

# Early stopping
early_stopping_patience: 30
early_stopping_metric: "combined_score"
convergence_threshold: 0.01
